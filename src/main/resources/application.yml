spring:
  profiles:
    active: DEV
  docker:
    compose:
      profiles:
        active: REC
  datasource:
    database: ctrl
    port: 5432
    driver-class-name: org.postgresql.Driver
    jdbc-url: jdbc:postgresql://0.0.0.0:5432/ctrl
    username: postgres
    password: postgres
    configuration:
      maximum-pool-size: 30
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  springdoc:
    api-docs:
      path: /api-docs
    swagger-ui:
      path: /swagger-ui-custom.html
      operationSorter: method
  devtools:
    add-properties: true
server:
  port: 8080

---
# Run with specific profile :
# ./gradlew bootRun --args='--spring.profiles.active=dev'

spring:
  config:
    activate:
      on-profile: REC
  docker:
    compose:
      profiles:
        active: REC
  datasource:
    database: ctrl
    port: 5432
    driver-class-name: org.postgresql.Driver
    jdbc-url: jdbc:postgresql://postgresContainer:5432/ctrl
    username: postgres
    password: postgres
    configuration:
      maximum-pool-size: 30
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  springdoc:
    api-docs:
      path: /api-docs
    swagger-ui:
      path: /swagger-ui-custom.html
      operationSorter: method
server:
  port: 8443
  ssl:
    key-store: "classpath:keystore/simpleapp.p12"
    key-store-type: PKCS12 # keystore type
    key-alias: simpleapp # keystore alias
    key-store-password: password  # keystore password